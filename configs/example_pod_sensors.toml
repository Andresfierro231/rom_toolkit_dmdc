# Phase 9 example: choose sparse POD sensors and reconstruct the full state.
# Run:
#   dmdc pod-sensors --config configs/example_pod_sensors.toml

[data]
path = "data/example_multicase_timeseries.csv"
time_col = "time"
case_col = "case_id"
state_cols = ["x1", "x2"]

[pod]
rank = "full"
center = true
scale = false

[sensor_selection]
n_sensors = 2
outdir = "outputs/example_pod_sensors"

[output]
plots = true
