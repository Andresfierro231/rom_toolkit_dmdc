[data]
path = "data/example_multicase_timeseries.csv"
time_col = "time"
case_col = "case_id"
state_cols = ["x1", "x2"]
input_cols = ["u1"]

[split]
train_cases = ["run_001", "run_002"]
test_cases = ["run_003"]

[compare]
models = ["persistence", "mean", "dmdc", "pod_dmdc"]

[pod]
rank = 0.999
center = true
scale = false

[model]
dmdc_rank = "full"

[output]
outdir = "outputs/example_model_comparison"
plots = true

[report]
enabled = true
