[data]
path = "data/example_multicase_timeseries.csv"
time_col = "time"
case_col = "case_id"
state_cols = ["x1", "x2"]
input_cols = ["u1"]

[split]
train_cases = ["run_001", "run_002"]
test_cases = ["run_003"]

[sweep]
models = ["persistence", "dmdc", "ridge_dmdc", "pod_dmdc"]
pod_ranks = [1, 2, 0.999]
dmdc_ranks = ["full"]
n_delays = [1, 2]

[pod]
center = true
scale = false

[output]
outdir = "outputs/template_rank_delay_sweep"
plots = true

[report]
enabled = true
