# Live Phase-2 replay + prediction config.
#
# This replays an existing CSV as if it were arriving live, loads a saved ROM
# trained offline, and writes forecasts at each new forecast origin.
#
# Recommended first test:
#   1. Train/choose a model offline, e.g. adaptive_model.pkl from adaptive-fit.
#   2. Point [model].path to that saved model.
#   3. Run: dmdc live-replay-predict --config configs/templates/live_replay_predict.toml

[stream]
type = "csv_replay"
path = "examples/end_to_end_thermal_loop_study/thermal_loop_synthetic.csv"
chunk_size = 5

[data]
time_col = "time"
case_col = "case_id"
case_id = "salt_test_1"
state_cols = ["TP1", "TP2", "TP3", "TP4", "TP5", "TP6", "massFlowRate"]
input_cols = ["q_heater", "T_amb", "h_amb"]

[model]
# Replace with a real saved model from adaptive-fit, fit, pod-dmdc, or pod-ml.
# AdaptiveDMDcModel is recommended for nonuniform/adaptive live timestamps.
path = "outputs/adaptive_fit/adaptive_model.pkl"

[forecast]
horizons_seconds = [5.0, 10.0, 30.0, 60.0]
# Only used for discrete/sample-step models. Adaptive models use the horizons directly.
# discrete_dt_seconds = 0.5

[live]
max_samples = 50
buffer_seconds = 120.0
save_every_batch = false
outdir = "outputs/live_replay_prediction_example"
