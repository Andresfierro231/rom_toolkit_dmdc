# Tail a CSV file being appended by a live logger, estimate the full state with
# POD-Kalman filtering, and optionally forecast from the filtered state.

[stream]
type = "csv_tail"
path = "live_data/current_loop_log.csv"
poll_seconds = 1.0
start_at_end = false

[data]
time_col = "time"
state_cols = ["TP1", "TP2", "TP3", "TP4", "TP5", "TP6", "massFlowRate"]
measurement_cols = ["TP1", "TP3", "TP6", "massFlowRate"]
input_cols = ["q_heater", "T_amb", "h_amb"]

[model]
path = "outputs/pod_dmdc/pod_dmdc_model.pkl"

[estimator]
process_noise = 1.0e-6
measurement_noise = 1.0e-3
initial_covariance = 1.0

[forecast]
horizons_seconds = [5.0, 10.0, 30.0]
discrete_dt_seconds = 0.5

[live]
max_polls = 100
buffer_seconds = 300.0
outdir = "outputs/live_csv_tail_estimate"
save_every_batch = true
