# Replay a historical CSV as if it were live, estimate the full state with a
# saved POD-DMDc model, and optionally forecast from the filtered state.

[stream]
type = "csv_replay"
path = "examples/end_to_end_thermal_loop_study/live_stream.csv"
chunk_size = 1

[data]
time_col = "time"
# Full state used by the saved POD-DMDc model.
state_cols = ["TP1", "TP2", "TP3", "TP4", "TP5", "TP6", "massFlowRate"]
# Measured columns actually present in the live stream. This may be a subset.
measurement_cols = ["TP1", "TP3", "TP6", "massFlowRate"]
input_cols = ["q_heater", "T_amb", "h_amb"]

[model]
path = "outputs/pod_dmdc/pod_dmdc_model.pkl"

[estimator]
process_noise = 1.0e-6
measurement_noise = 1.0e-3
initial_covariance = 1.0

[forecast]
horizons_seconds = [5.0, 10.0, 30.0]
# Required for discrete POD-DMDc models when translating physical seconds to steps.
discrete_dt_seconds = 0.5

[live]
max_samples = 100
buffer_seconds = 300.0
outdir = "outputs/live_replay_estimate"
