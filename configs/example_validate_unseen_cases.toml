[data]
path = "data/example_multicase_timeseries.csv"
time_col = "time"
case_col = "case_id"
state_cols = ["x1", "x2"]
input_cols = ["u1"]

[split]
strategy = "explicit_case_lists"
train_cases = ["run_001", "run_002"]
test_cases = ["run_003"]

[pod]
rank = 0.999
center = true
scale = false

[model]
dmdc_rank = "full"

[validation]
forecast_horizons = [1, 2, 5]

[output]
outdir = "outputs/example_validation"
plots = true
