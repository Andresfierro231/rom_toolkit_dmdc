# Optional Phase 7 POD-ML example.
# ML acts only on POD modal coefficients. POD itself is still computed by SVD.

[data]
path = "data/example_multicase_timeseries.csv"
time_col = "time"
case_col = "case_id"
state_cols = ["x1", "x2"]
input_cols = ["u1"]

[pod]
rank = 0.999
center = true
scale = false

[ml]
model_type = "ridge"          # ridge, random_forest, gradient_boosting, or mlp
recursive_rollout = true
outdir = "outputs/example_pod_ml"

[output]
plots = true
