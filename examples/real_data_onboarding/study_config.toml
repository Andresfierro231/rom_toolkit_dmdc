# Real data onboarding central config.
#
# Copy this folder, then replace every TODO_* value with your actual paths,
# columns, and case ids. Commands only read the sections they need, so this
# one file can drive import, inspection, offline ROMs, live replay, dashboard,
# archive, and operator-report workflows.
#
# Default assumption: time steps are nonuniform/adaptive.
# Use `adaptive-fit` or `adaptive_dmdc` first. Only resample if you deliberately
# want a fixed-grid discrete-time model.

[importer]
# Options: auto, csv, excel, parquet, folder, labview_daq, epics.
type = "TODO_csv_excel_folder_or_labview_daq"
source = "TODO_absolute_or_relative_path_to_raw_file_or_folder"
pattern = "*.csv"
sheet = "Sheet1"
column_map = "column_map.toml"
output_format = "parquet"
case_from_filename = true
max_files = 10  # start small while testing; remove or increase for full import
strict_parquet = false

# EPICS example; only used when [importer].type = "epics".
# Install optional support with: python -m pip install -e '.[epics]'
[importer.epics_pvs]
# TP1 = "TODO:LOOP:TP1"
# TP2 = "TODO:LOOP:TP2"
# massFlowRate = "TODO:LOOP:MDOT"
# q_heater = "TODO:LOOP:HEATER:POWER"

[data]
path = "data/processed/simple_loop_canonical.parquet"
time_col = "time"
case_col = "case_id"
state_cols = ["TP1", "TP2", "TP3", "TP4", "TP5", "TP6", "massFlowRate"]
measurement_cols = ["TP1", "TP3", "TP6", "massFlowRate"]
input_cols = ["q_heater", "T_amb", "h_amb"]

[units]
TP1 = "K"
TP2 = "K"
TP3 = "K"
TP4 = "K"
TP5 = "K"
TP6 = "K"
massFlowRate = "kg/s"
q_heater = "W"
T_amb = "K"
h_amb = "W/m^2-K"

[state_groups]
fluid_temperatures = ["TP1", "TP2", "TP3", "TP4", "TP5", "TP6"]
flow = ["massFlowRate"]

[time]
mode = "adaptive"
assume_uniform = false

[time_window]
# Optional. Uncomment after inspection if you want to remove startup or failed tails.
# t_min = 0.0
# t_max = 850.0

[case_quality]
min_samples = 20
min_duration = 1.0
required_final_time = 850.0
final_time_tolerance = 1.0

[split]
# Start with explicit lists once you know your case ids from inspection.
# For a first smoke test, use strategy = "by_case_fraction".
strategy = "by_case_fraction"
train_fraction = 0.7
# train_cases = ["TODO_case_001", "TODO_case_002"]
# test_cases = ["TODO_case_003"]

[pod]
rank = 0.999
center = true
scale = false

[model]
type = "pod_dmdc"
dmdc_rank = "full"
n_delays = 1

[adaptive]
alpha = 1.0e-8

[regularized]
alpha = 1.0e-6

[compare]
models = ["persistence", "mean", "adaptive_dmdc", "dmdc", "ridge_dmdc", "pod_dmdc"]
outdir = "outputs/real_data_onboarding/model_comparison"
plots = true
report = true

[validation]
forecast_horizons = [1, 5, 10, 25, 50]
outdir = "outputs/real_data_onboarding/validation"
plots = true

[stream]
# Replay mode uses [data].path. Live mode can tail this CSV if your DAQ/logger appends rows.
type = "csv_tail"
path = "TODO_live_data/current_loop_log.csv"
poll_seconds = 0.5
chunk_size = 1
start_at_end = true

[forecast]
horizons_seconds = [5, 10, 30, 60]
discrete_dt_seconds = 0.5

[estimator]
measurement_cols = ["TP1", "TP3", "TP6", "massFlowRate"]
process_noise = 1.0e-6
measurement_noise = 1.0e-3
initial_covariance = 1.0

[monitor]
enabled = true
residual_abs_threshold = 5.0
innovation_abs_threshold = 5.0
innovation_norm_threshold = 12.0
forecast_match_tolerance_seconds = 0.5
operating_ranges = { q_heater = [0.0, 120.0], T_amb = [280.0, 330.0], h_amb = [0.0, 50.0] }

[live_adaptation]
enabled = true
method = "horizon_state_bias"

[live_adaptation.bias]
learning_rate = 0.01
max_abs_bias = 10.0
max_update_step = 0.25
update_only_when_trust_above = 0.70
skip_when_outside_training_envelope = true
clip_residual_abs = 20.0

[live_archive]
enabled = true
root = "live_archive/real_data_onboarding"
format = "parquet"
compression = "zstd"
flush_rows = 10000
flush_seconds = 30.0

[summaries]
enabled = true
windows_seconds = [60, 300, 3600]

[quicklooks]
enabled = true
hourly = true
daily = true

[dashboard]
mode = "auto"
view = "operator"
run_dir = "outputs/real_data_onboarding/live_adaptation"
archive_root = "live_archive/real_data_onboarding"
window_label = "60s"
refresh_seconds = 2.0

[report]
enabled = true
format = "latex"
compile_pdf = false

[output]
imported_data = "data/processed/simple_loop_canonical.parquet"
outdir = "outputs/real_data_onboarding"
inspection_outdir = "outputs/real_data_onboarding/inspection"
adaptive_outdir = "outputs/real_data_onboarding/adaptive_fit"
pod_dmdc_outdir = "outputs/real_data_onboarding/pod_dmdc"
live_monitor_outdir = "outputs/real_data_onboarding/live_monitor"
live_adaptation_outdir = "outputs/real_data_onboarding/live_adaptation"
operator_report_outdir = "outputs/real_data_onboarding/operator_report"
plots = true
